name: devsecops-round2

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: empire_lms
          POSTGRES_USER: empire_lms
          POSTGRES_PASSWORD: empire_lms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U empire_lms -d empire_lms"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
      registry:
        image: registry:2
        ports:
          - 5000:5000
    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://empire_lms:empire_lms@127.0.0.1:5432/empire_lms' }}
      BETTER_AUTH_SECRET: ${{ secrets.CI_BETTER_AUTH_SECRET || 'ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.CI_NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      PAYMENT_MODE: ${{ secrets.CI_PAYMENT_MODE || 'mock' }}
      STRIPE_SECRET_KEY: ${{ secrets.CI_STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.CI_STRIPE_WEBHOOK_SECRET }}
      PAYPAL_CLIENT_ID: ${{ secrets.CI_PAYPAL_CLIENT_ID }}
      PAYPAL_CLIENT_SECRET: ${{ secrets.CI_PAYPAL_CLIENT_SECRET }}
      IMAGE_REF: 127.0.0.1:5000/empire-lms:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p artifacts/security

      - name: Secret scan (gitleaks)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            dir /repo \
            --config /repo/.gitleaks.toml \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path /repo/artifacts/security/gitleaks.sarif

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security preflight (secret-management policy)
        run: ./scripts/devsecops/preflight-env.sh --from-env --forbid-dotenv

      - name: Prisma generate and deploy migration
        run: |
          PRISMA_CONFIG_FLAG=""
          if [ -f prisma/prisma.config.ts ]; then
            PRISMA_CONFIG_FLAG="--config=prisma/prisma.config.ts"
          elif [ -f prisma.config.ts ]; then
            PRISMA_CONFIG_FLAG="--config=prisma.config.ts"
          fi

          npx prisma generate ${PRISMA_CONFIG_FLAG}
          npx prisma migrate deploy ${PRISMA_CONFIG_FLAG}

      - name: SAST - TypeScript typecheck
        run: npx tsc --noEmit

      - name: SCA - Dependency/CVE audit (production)
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=high --json \
            | tee artifacts/security/npm-audit.json >/dev/null

      - name: Build app for DAST baseline
        run: npm run build

      - name: Start app for DAST baseline
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > artifacts/security/app-runtime.log 2>&1 &
          echo $! > artifacts/security/app.pid

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "[OK] App is reachable for DAST."
              exit 0
            fi
            sleep 2
          done

          echo "[ERROR] App did not become reachable in time."
          cat artifacts/security/app-runtime.log || true
          exit 1

      - name: DAST - OWASP ZAP baseline scan
        run: |
          docker run --rm \
            --network host \
            -v "$PWD/artifacts/security:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:3000 \
            -m 3 \
            -T 10 \
            -J zap-report.json \
            -w zap-report.md \
            -x zap-report.xml \
            -I

      - name: DAST policy gate (high findings only)
        run: |
          node <<'NODE'
          const fs = require('fs');
          const reportPath = 'artifacts/security/zap-report.json';
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const findings = [];

          for (const site of report.site || []) {
            for (const alert of site.alerts || []) {
              const risk = Number(alert.riskcode ?? 0);
              if (risk >= 3) {
                findings.push({
                  name: alert.name,
                  riskdesc: alert.riskdesc,
                  confidence: alert.confidence,
                  uri: alert.instances?.[0]?.uri || 'n/a',
                });
              }
            }
          }

          console.log(`DAST high findings: ${findings.length}`);
          if (findings.length > 0) {
            console.error('[ERROR] DAST high-risk findings detected.');
            console.error(JSON.stringify(findings, null, 2));
            process.exit(1);
          }
          NODE

      - name: Stop DAST app
        if: always()
        run: |
          if [ -f artifacts/security/app.pid ]; then
            kill "$(cat artifacts/security/app.pid)" >/dev/null 2>&1 || true
          fi

      - name: Build and push container image
        run: |
          docker build --pull --tag "${IMAGE_REF}" .
          docker push "${IMAGE_REF}"

      - name: Container runtime policy check (non-root)
        run: |
          IMAGE_USER="$(docker image inspect --format '{{.Config.User}}' "${IMAGE_REF}")"
          if [ -z "${IMAGE_USER}" ] || [ "${IMAGE_USER}" = "root" ] || [ "${IMAGE_USER}" = "0" ]; then
            echo "[ERROR] Runtime image user must be non-root."
            exit 1
          fi

          echo "${IMAGE_USER}" > artifacts/security/container-runtime-user.txt
          echo "[OK] Container runtime user: ${IMAGE_USER}"

      - name: Container image CVE scan (trivy)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/artifacts/security:/out" \
            aquasec/trivy:0.52.2 \
            image \
            --scanners vuln \
            --vuln-type os \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format json \
            --output /out/trivy-image.json \
            "${IMAGE_REF}"

      - name: Generate SBOM (SPDX JSON)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/artifacts/security:/out" \
            anchore/syft:v1.24.0 \
            "${IMAGE_REF}" \
            -o spdx-json=/out/sbom.spdx.json

      - name: Install cosign
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL \
            https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64 \
            -o "$HOME/.local/bin/cosign"
          chmod +x "$HOME/.local/bin/cosign"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Image signing and signature verification
        env:
          COSIGN_PASSWORD: ""
        run: |
          DIGEST_REF="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}")"
          cosign generate-key-pair --output-key-prefix artifacts/security/cosign
          cosign sign --yes --tlog-upload=false --allow-insecure-registry --key artifacts/security/cosign.key "${DIGEST_REF}"
          cosign verify --insecure-ignore-tlog=true --allow-insecure-registry --key artifacts/security/cosign.pub "${DIGEST_REF}" \
            > artifacts/security/cosign-verify.json

      - name: Upload DevSecOps artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-round2-artifacts
          path: artifacts/security
          if-no-files-found: error
