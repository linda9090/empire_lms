services:
  postgres:
    image: postgres:16-alpine
    container_name: empire-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: empire_lms
      POSTGRES_USER: empire_lms
      POSTGRES_PASSWORD: empire_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empire_lms -d empire_lms"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
    name: empire_lms_postgres_data
